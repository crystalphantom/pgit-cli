name: CI

on:
  push:
    branches: [ main, develop , dev ]
  pull_request:
    branches: [ main, develop , dev ]

jobs:
  test:
    name: Test on ubuntu-latest with Node 20.x
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js 20.x
        uses: actions/setup-node@v5
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Configure Git user
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git config --global core.autocrlf false

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=moderate

      - name: Check code formatting
        run: npm run format:check

      - name: Lint code
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build project
        run: npm run build

      - name: Run tests
        run: npm run test:ci
        env:
          CI: true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella

      - name: Test CLI installation and basic functionality
        run: npm run test:package

      - name: Test private config functionality
        run: |
          rm -rf test-repo test-home
          mkdir -p test-repo
          mkdir -p test-home
          export HOME="$PWD/test-home"
          cd test-repo

          git init
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"

          echo "rules v1" > agent-rules.md
          node ../dist/cli.js add agent-rules.md

          # The recommended private config flow keeps real repo-local files.
          test ! -L agent-rules.md
          grep "rules v1" agent-rules.md

          echo "rules v2" > agent-rules.md
          node ../dist/cli.js push agent-rules.md
          rm agent-rules.md
          node ../dist/cli.js pull agent-rules.md
          grep "rules v2" agent-rules.md
        shell: bash

      - name: Store build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: |
            dist/
            package.json
            README.md
          retention-days: 30

  quality:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [test]
    if: always()

    steps:
      - name: Quality Gate - Test Results
        run: echo "All tests passed"

      - name: Quality Gate Summary
        run: |
          echo "✅ Code quality checks passed"
          echo "✅ Build artifacts generated"
